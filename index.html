<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Square Social</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      background: #181818;
    }

    .topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      z-index: 10;
    }

    .panel {
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .room-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    .emoji-bar {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: calc(100vw - 24px);
      justify-content: center;
      z-index: 10;
    }

    .emoji-btn {
      width: 42px;
      height: 42px;
      font-size: 22px;
      padding: 0;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="panel" id="status">Connecting...</div>
    <div class="panel">
      <div>Rooms</div>
      <div class="room-buttons" id="roomButtons"></div>
    </div>
  </div>

  <div class="emoji-bar" id="emojiBar"></div>
  <canvas id="game"></canvas>

  <script>
    const SERVER_URL = "ws://localhost:3000";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const roomButtonsEl = document.getElementById("roomButtons");
    const emojiBarEl = document.getElementById("emojiBar");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const ROOM_THEMES = {
      plaza: "#181818",
      lounge: "#122033",
      rooftop: "#23122f"
    };

    const ALLOWED_EMOJIS = ["😭","😀","😠","😕","👋","😎","❗","❓","❎","✅","👏"];

    let socket;
    let myId = null;
    let currentRoom = "plaza";
    let players = {};
    let localTarget = { x: 250, y: 250 };

    function connect() {
      socket = new WebSocket(SERVER_URL);

      socket.onopen = () => {
        statusEl.textContent = "Connected";
      };

      socket.onclose = () => {
        statusEl.textContent = "Disconnected";
      };

      socket.onerror = () => {
        statusEl.textContent = "Connection error";
      };

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "welcome") {
          myId = data.id;
          currentRoom = data.room;
          buildRoomButtons(data.rooms || []);
        }

        if (data.type === "state") {
          currentRoom = data.room;
          players = data.players || {};
        }
      };
    }

    function buildRoomButtons(rooms) {
      roomButtonsEl.innerHTML = "";
      rooms.forEach((roomName) => {
        const btn = document.createElement("button");
        btn.textContent = roomName;
        btn.onclick = () => {
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
              type: "joinRoom",
              room: roomName
            }));
          }
        };
        roomButtonsEl.appendChild(btn);
      });
    }

    function buildEmojiButtons() {
      emojiBarEl.innerHTML = "";
      ALLOWED_EMOJIS.forEach((emoji) => {
        const btn = document.createElement("button");
        btn.className = "emoji-btn";
        btn.textContent = emoji;
        btn.onclick = () => {
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
              type: "emoji",
              emoji
            }));
          }
        };
        emojiBarEl.appendChild(btn);
      });
    }

    function setMoveTarget(x, y) {
      localTarget.x = x;
      localTarget.y = y;

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: "move",
          x,
          y
        }));
      }
    }

    canvas.addEventListener("click", (event) => {
      setMoveTarget(event.clientX, event.clientY);
    });

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      if (!event.touches.length) return;
      setMoveTarget(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: false });

    function drawGrid() {
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;

      const size = 40;
      for (let x = 0; x < canvas.width; x += size) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += size) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawRoomLabel() {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = "16px Arial";
      ctx.fillText(`Room: ${currentRoom}`, 20, canvas.height - 20);
    }

    function drawPlayer(p, isSelf) {
      const size = 30;

      ctx.fillStyle = isSelf ? "#ff4fd8" : "#45d7ff";
      ctx.fillRect(p.x - size / 2, p.y - size / 2, size, size);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x - size / 2, p.y - size / 2, size, size);

      ctx.fillStyle = "white";
      ctx.font = "13px Arial";
      const nameWidth = ctx.measureText(p.name).width;
      ctx.fillText(p.name, p.x - nameWidth / 2, p.y - 24);

      if (p.emoji) {
        ctx.font = "24px Arial";
        ctx.fillText(p.emoji, p.x - 10, p.y - 42);
      }
    }

    function loop() {
      ctx.fillStyle = ROOM_THEMES[currentRoom] || "#181818";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawRoomLabel();

      Object.values(players).forEach((p) => {
        drawPlayer(p, p.id === myId);
      });

      requestAnimationFrame(loop);
    }

    buildEmojiButtons();
    connect();
    loop();
  </script>
</body>
</html>
