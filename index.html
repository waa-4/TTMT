<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Square Social</title>

<style>
body {
  margin:0;
  background:#111;
  overflow:hidden;
  font-family:sans-serif;
}

canvas {
  display:block;
}

#ui {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

button {
  font-size:18px;
  padding:5px 10px;
  background:black;
  color:white;
  border:1px solid white;
  cursor:pointer;
}

#roomUI {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>

<body>

<div id="roomUI">
  Room:
  <button onclick="switchRoom(0)">A</button>
  <button onclick="switchRoom(1)">B</button>
</div>

<div id="ui"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// Rooms
let currentRoom = 0;

let rooms = [
  { color:"#1a1a1a", players:[] },
  { color:"#001a2a", players:[] }
];

// Player
let player = {
  x:200,
  y:200,
  targetX:200,
  targetY:200,
  size:30,
  speed:4,
  emoji:null,
  emojiTimer:0
};

// Fake players per room
function createFakePlayers() {
  rooms.forEach(room => {
    room.players = [];
    for (let i=0;i<4;i++) {
      room.players.push({
        x:Math.random()*800,
        y:Math.random()*500,
        size:30,
        emoji:null,
        emojiTimer:0
      });
    }
  });
}
createFakePlayers();

// Movement
canvas.onclick = e => {
  player.targetX = e.clientX;
  player.targetY = e.clientY;
};

// Emotes
const emojis = ["😭","😀","😠","😕","👋","😎","❗","❓","❎","✅","👏"];

const ui = document.getElementById("ui");

emojis.forEach(em => {
  let btn = document.createElement("button");
  btn.textContent = em;
  btn.onclick = () => sendEmoji(em);
  ui.appendChild(btn);
});

function sendEmoji(em) {
  player.emoji = em;
  player.emojiTimer = 120;
}

// Room switch
function switchRoom(id) {
  currentRoom = id;
}

// Update
function update() {

  // Player movement
  let dx = player.targetX - player.x;
  let dy = player.targetY - player.y;
  let dist = Math.hypot(dx,dy);

  if (dist > 1) {
    player.x += dx/dist * player.speed;
    player.y += dy/dist * player.speed;
  }

  // Emoji decay
  if (player.emojiTimer > 0) player.emojiTimer--;
  else player.emoji = null;

  // Fake players random emotes
  rooms[currentRoom].players.forEach(p => {
    if (Math.random() < 0.005) {
      p.emoji = emojis[Math.floor(Math.random()*emojis.length)];
      p.emojiTimer = 100;
    }

    if (p.emojiTimer > 0) p.emojiTimer--;
    else p.emoji = null;
  });
}

// Draw
function draw() {

  ctx.fillStyle = rooms[currentRoom].color;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Player
  ctx.fillStyle = "hotpink";
  ctx.fillRect(player.x-15, player.y-15, 30, 30);

  if (player.emoji) {
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText(player.emoji, player.x-10, player.y-25);
  }

  // Others
  rooms[currentRoom].players.forEach(p => {
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(p.x-15, p.y-15, 30, 30);

    if (p.emoji) {
      ctx.fillStyle = "white";
      ctx.fillText(p.emoji, p.x-10, p.y-25);
    }
  });
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
